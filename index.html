<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fu Yu / 付钰 — AI 应用开发工程师</title>
  <style>
    /* ==========================================================================
       Base / Variables
       ========================================================================== */
    :root {
      /* Pixel Amber Tech Palette */
      --bg: #F6E7C8;
      
      --text-main: #151515;
      --text-secondary: #374151;
      --text-muted: #6B7280;
      
      --brand: #064E3B;
      --brand-hover: #022C22;
      
      --amber: #F59E0B;
      --orange: #EA580C;
      
      --blue-electric: #2563EB;
      --blue-deep: #1E3A8A;
      
      --pixel-pink: #DB2777;
      --success: #10B981;
      
      --surface: #FFF7E6;
      --surface-strong: #FFFFFF;
      --surface-contrast: #111827;
      --surface-muted: #F1E4CB;
      
      --border: #C9964A;
      --border-soft: #E2C48D;
      --border-strong: #BFAF9C;
      
      --shadow: rgba(21, 21, 21, 0.14);
      
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font-sans);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ==========================================================================
       Layout
       ========================================================================== */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    h1, h2, h3, h4 { font-family: var(--font-sans); font-weight: 700; letter-spacing: -0.02em; }
    .font-mono { font-family: var(--font-mono); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 12px 24px; border: 2px solid; border-radius: 4px;
      font-weight: 600; cursor: pointer; text-decoration: none;
      transition: all 0.2s; font-size: 15px;
    }
    .btn-primary { background: var(--brand); color: var(--surface-strong); border-color: var(--brand); }
    .btn-primary:hover {
      background: var(--brand-hover); border-color: var(--amber);
      transform: translateY(-2px);
      box-shadow: 4px 4px 0 var(--border), 0 4px 12px rgba(245, 158, 11, 0.2);
    }
    .btn-secondary { background: var(--surface-strong); color: var(--text-main); border-color: var(--border); }
    .btn-secondary:hover {
      background: var(--surface); border-color: var(--brand); color: var(--brand);
      transform: translateY(-2px);
      box-shadow: 4px 4px 0 var(--border), 0 4px 12px rgba(6, 78, 59, 0.1);
    }
    .btn:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }

    /* Navbar */
    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 0; border-bottom: 2px solid var(--border); margin-bottom: 48px;
    }
    .nav-brand { font-size: 18px; font-weight: 700; text-decoration: none; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
    .nav-brand::before { content: ''; width: 12px; height: 12px; background: var(--amber); border: 2px solid var(--text-main); }
    .nav-links { display: flex; gap: 32px; }
    .nav-link { color: var(--text-secondary); text-decoration: none; font-weight: 600; font-size: 15px; position: relative; padding: 4px 0; transition: color 0.18s; }
    .nav-link:hover { color: var(--brand); }
    .nav-link::after {
      content: ''; position: absolute; left: 0; bottom: 0; width: 100%; height: 2px;
      background: repeating-linear-gradient(90deg, var(--amber), var(--amber) 4px, transparent 4px, transparent 6px);
      transform: scaleX(0); transform-origin: left; transition: transform 0.18s ease-out;
    }
    .nav-link:hover::after { transform: scaleX(1); }

    /* Footer */
    .footer { border-top: 4px solid var(--border); padding: 48px 0; margin-top: 64px; background: var(--surface-strong); }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; }
    .footer-copy { font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 12px; }
    .footer-copy::before { content: ''; width: 16px; height: 16px; background: var(--brand); display: block; }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: var(--text-secondary); text-decoration: none; font-weight: 600; font-size: 14px; transition: color 0.2s; }
    .footer-links a:hover { color: var(--brand); text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 4px; }

    /* ==========================================================================
       Section Details
       ========================================================================== */
    .section { padding: 96px 0; position: relative; }
    .section-divider {
      position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
      background: repeating-linear-gradient(90deg, var(--border-soft), var(--border-soft) 4px, transparent 4px, transparent 8px);
    }
    .section-header { margin-bottom: 64px; }
    .sh-top { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .sh-num { font-family: var(--font-mono); font-size: 20px; font-weight: 700; color: var(--amber); }
    .sh-line { height: 2px; flex: 1; max-width: 60px; background: var(--border); }
    .sh-title { font-size: 32px; color: var(--text-main); }
    .sh-subtitle { font-size: 16px; color: var(--text-secondary); max-width: 600px; line-height: 1.6; border-left: 4px solid var(--brand); padding-left: 16px; }

    /* ==========================================================================
       Hero
       ========================================================================== */
    .hero { position: relative; padding: 64px 0 120px; }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(var(--border-soft) 1.5px, transparent 1.5px);
      background-size: 24px 24px; opacity: 0.6; z-index: -1; pointer-events: none;
    }
    .hero-content { display: grid; grid-template-columns: 1.2fr 1fr; gap: 64px; align-items: center; }
    .hero-text { position: relative; z-index: 1; }
    .hero-subtitle {
      font-family: var(--font-mono); color: var(--brand); font-weight: 600; font-size: 14px;
      margin-bottom: 24px; display: inline-flex; align-items: center; gap: 12px;
      background: var(--surface-strong); padding: 8px 16px; border: 2px solid var(--border); border-radius: 4px;
    }
    .hero-subtitle::before { content: ''; width: 8px; height: 8px; background: var(--amber); }
    .hero-title { font-size: clamp(40px, 4.5vw, 64px); line-height: 1.2; margin-bottom: 24px; color: var(--text-main); }
    .hero-desc { font-size: 18px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 40px; max-width: 600px; background: rgba(246, 231, 200, 0.8); padding: 4px 0; }
    .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }

    .hero-visual { position: relative; display: flex; justify-content: flex-start; }
    .status-card {
      background: var(--surface-strong); border: 2px solid var(--border); border-radius: 8px;
      padding: 24px; box-shadow: 8px 8px 0 var(--border-soft); position: relative; z-index: 1;
      width: 100%; max-width: 380px;
    }
    .sc-header {
      font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.05em; border-bottom: 2px solid var(--border-soft); padding-bottom: 12px;
      margin-bottom: 16px; display: flex; justify-content: space-between;
    }
    .sc-header::after { content: '[ SYS_LOG ]'; color: var(--amber); animation: syslog-blink 2.2s infinite; }
    @keyframes syslog-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }
    .sc-title { font-weight: 700; font-size: 18px; color: var(--brand); margin-bottom: 20px; }
    .sc-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .sc-item { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600; color: var(--text-secondary); transition: transform 0.2s; }
    .sc-item:hover { transform: translateX(2px); }
    .sc-item:hover .sc-dot { transform: scale(1.2); border-color: var(--amber); box-shadow: 0 0 4px var(--amber); }
    .sc-dot { width: 10px; height: 10px; border-radius: 2px; border: 2px solid var(--border); flex-shrink: 0; transition: all 0.2s; }
    .sc-dot.done { background: var(--brand); border-color: var(--brand); }
    .sc-dot.in-progress { background: var(--amber); border-color: var(--orange); animation: blink 2s infinite; }
    .sc-dot.iterating { background: var(--blue-electric); border-color: var(--blue-deep); }
    .sc-dot.pending { background: var(--surface); border-color: var(--text-muted); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .data-pulse-line {
      position: absolute; top: 120px; left: 350px; right: 120px; height: 2px;
      background: repeating-linear-gradient(90deg, var(--amber), var(--amber) 4px, transparent 4px, transparent 8px);
      background-size: 16px 2px; animation: pulse-flow 0.6s linear infinite; z-index: 0; opacity: 0.5;
    }
    @keyframes pulse-flow { to { background-position: -16px 0; } }

    .mascot-wrapper { position: absolute; right: 0; bottom: -60px; display: flex; align-items: flex-end; gap: 16px; z-index: 2; }
    .bubble { background: var(--surface-strong); border: 2px solid var(--brand); padding: 8px 12px; font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--brand); position: relative; box-shadow: 4px 4px 0 var(--border-soft); animation: float-bubble 4s ease-in-out infinite reverse; }
    .bubble::before { content: ''; position: absolute; right: -8px; bottom: 12px; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 6px solid var(--brand); }
    .bubble::after { content: ''; position: absolute; right: -4px; bottom: 12px; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 6px solid var(--surface-strong); }
    .mascot { width: 64px; height: 64px; animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes float-bubble { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

    /* ==========================================================================
       Pixel AI Core (3D)
       ========================================================================== */
    .pixel-ai-core-scene {
      position: absolute; right: -240px; top: 50%; margin-top: -120px;
      width: 240px; height: 240px; perspective: 1200px; z-index: 5;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      animation: core-float 3.2s ease-in-out infinite;
    }
    .pixel-ai-core { position: relative; width: 80px; height: 80px; transform-style: preserve-3d; cursor: grab; transition: transform 0.1s linear; }
    .pixel-ai-core:active { cursor: grabbing; }
    .pixel-cube { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .pixel-cube.exploded .cube-face { box-shadow: inset 0 0 0 4px rgba(0,0,0,0.2), 8px 8px 0 rgba(0,0,0,0.1); }
    .pixel-cube.exploded .cube-face.front  { transform: translateZ(52px); }
    .pixel-cube.exploded .cube-face.back   { transform: rotateY(180deg) translateZ(52px); }
    .pixel-cube.exploded .cube-face.right  { transform: rotateY(90deg) translateZ(52px); }
    .pixel-cube.exploded .cube-face.left   { transform: rotateY(-90deg) translateZ(52px); }
    .pixel-cube.exploded .cube-face.top    { transform: rotateX(90deg) translateZ(52px); }
    .pixel-cube.exploded .cube-face.bottom { transform: rotateX(-90deg) translateZ(52px); }
    
    .cube-face {
      position: absolute; width: 80px; height: 80px; border: 2px solid var(--text-main);
      box-shadow: inset 0 0 0 4px rgba(0,0,0,0.2), 4px 4px 0 rgba(0,0,0,0.2);
      background-image: linear-gradient(rgba(255,255,255,0.1) 2px, transparent 2px), linear-gradient(90deg, rgba(255,255,255,0.1) 2px, transparent 2px);
      background-size: 16px 16px; transition: all 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .cube-face.front  { transform: translateZ(40px); background-color: var(--brand); }
    .cube-face.back   { transform: rotateY(180deg) translateZ(40px); background-color: #044030; }
    .cube-face.right  { transform: rotateY(90deg) translateZ(40px); background-color: #054a38; }
    .cube-face.left   { transform: rotateY(-90deg) translateZ(40px); background-color: #075a45; }
    .cube-face.top    { transform: rotateX(90deg) translateZ(40px); background-color: #086b51; }
    .cube-face.bottom { transform: rotateX(-90deg) translateZ(40px); background-color: #032b20; }
    
    .inner-core {
      position: absolute; top: 30px; left: 30px; width: 20px; height: 20px;
      background: #34D399; border: 2px solid var(--text-main); transform: translateZ(0);
      box-shadow: 0 0 10px #34D399, 0 0 20px #34D399; animation: energy-pulse 2s infinite;
    }
    @keyframes energy-pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.4); opacity: 1; box-shadow: 0 0 15px #34D399, 0 0 30px #34D399; } }
    
    .ring-path { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; border: 2px dashed rgba(6, 78, 59, 0.3); border-radius: 50%; pointer-events: none; }
    .ring-path-1 { width: 140px; height: 140px; margin: -70px 0 0 -70px; transform: rotateX(70deg); }
    .ring-path-2 { width: 180px; height: 180px; margin: -90px 0 0 -90px; transform: rotateX(60deg) rotateY(30deg); }
    .ring-path-3 { width: 220px; height: 220px; margin: -110px 0 0 -110px; transform: rotateX(60deg) rotateY(-30deg); }
    
    .orbit-token-wrapper { position: absolute; top: 50%; left: 50%; width: 0; height: 0; transform-style: preserve-3d; }
    .token-1 { animation: orbit-1 8s linear infinite; } @keyframes orbit-1 { 0% { transform: rotateX(70deg) rotateZ(0deg) translateY(-70px) rotateZ(0deg) rotateX(-70deg); } 100% { transform: rotateX(70deg) rotateZ(360deg) translateY(-70px) rotateZ(-360deg) rotateX(-70deg); } }
    .token-2 { animation: orbit-2 10s linear infinite reverse; } @keyframes orbit-2 { 0% { transform: rotateX(60deg) rotateY(30deg) rotateZ(0deg) translateY(-90px) rotateZ(0deg) rotateY(-30deg) rotateX(-60deg); } 100% { transform: rotateX(60deg) rotateY(30deg) rotateZ(360deg) translateY(-90px) rotateZ(-360deg) rotateY(-30deg) rotateX(-60deg); } }
    .token-3 { animation: orbit-3 12s linear infinite; } @keyframes orbit-3 { 0% { transform: rotateX(60deg) rotateY(-30deg) rotateZ(0deg) translateY(-110px) rotateZ(0deg) rotateY(30deg) rotateX(-60deg); } 100% { transform: rotateX(60deg) rotateY(-30deg) rotateZ(360deg) translateY(-110px) rotateZ(-360deg) rotateY(30deg) rotateX(-60deg); } }
    .token-4 { animation: orbit-4 8s linear infinite; } @keyframes orbit-4 { 0% { transform: rotateX(70deg) rotateZ(180deg) translateY(-70px) rotateZ(-180deg) rotateX(-70deg); } 100% { transform: rotateX(70deg) rotateZ(540deg) translateY(-70px) rotateZ(-540deg) rotateX(-70deg); } }
    
    .orbit-token {
      position: absolute; transform: translate(-50%, -50%); background: var(--surface-strong); color: var(--brand); font-family: var(--font-mono); font-size: 10px; font-weight: 700;
      padding: 2px 6px; border: 2px solid var(--text-main); box-shadow: 2px 2px 0 rgba(0,0,0,0.2); transition: all 0.3s ease; white-space: nowrap; pointer-events: auto;
    }
    .pixel-ai-core-scene:hover .orbit-token { color: var(--amber); border-color: var(--brand); box-shadow: 4px 4px 0 rgba(0,0,0,0.2); padding: 4px 8px; }
    .orbit-token.flash { background: var(--amber) !important; color: var(--surface-strong) !important; }

    .ai-core-console {
      position: absolute; bottom: -50px; width: 120px; background: var(--surface-strong); border: 2px solid var(--text-main);
      box-shadow: 4px 4px 0 var(--border); padding: 6px; display: flex; flex-direction: column; gap: 6px; z-index: 10;
    }
    .console-lights { display: flex; justify-content: space-between; padding: 0 4px; }
    .c-light { width: 12px; height: 12px; border: 2px solid var(--text-main); background: var(--text-muted); transition: opacity 0.2s; }
    .c-light.req { background: var(--success); }
    .c-light.build { background: var(--amber); }
    .c-light.ship { background: var(--text-muted); }
    .console-screen {
      background: #000; color: #10B981; font-family: var(--font-mono); font-size: 10px; font-weight: bold;
      text-align: center; padding: 4px; border: 2px solid var(--text-muted);
    }

    /* ==========================================================================
       Project Carousel
       ========================================================================== */
    .projects-grid { display: flex; flex-direction: column; gap: 48px; }
    .project-card {
      display: grid; grid-template-columns: 1fr 1fr; border: 2px solid var(--border); border-radius: 8px;
      background: var(--surface-strong); overflow: hidden; transition: all 0.3s ease; box-shadow: 8px 8px 0 var(--border-soft);
    }
    .project-card:hover { transform: translateY(-4px); box-shadow: 12px 12px 0 var(--border), 0 0 20px rgba(201, 150, 74, 0.3); }
    .project-card.blue-theme:hover { border-color: var(--blue-electric); box-shadow: 12px 12px 0 var(--blue-electric), 0 0 20px rgba(37, 99, 235, 0.3); }
    .project-card.orange-theme:hover { border-color: var(--orange); box-shadow: 12px 12px 0 var(--orange), 0 0 20px rgba(234, 88, 12, 0.3); }
    
    .pc-image-col { border-right: 2px solid var(--border); background: var(--surface); display: flex; flex-direction: column; }
    .pc-window-bar {
      height: 36px; border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; background: var(--surface-strong);
    }
    .pc-window-controls { display: flex; gap: 8px; }
    .pc-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border); }
    .blue-theme .pc-window-controls .pc-dot:nth-child(1) { background: var(--pixel-pink); }
    .blue-theme .pc-window-controls .pc-dot:nth-child(2) { background: var(--blue-electric); }
    .blue-theme .pc-window-controls .pc-dot:nth-child(3) { background: var(--blue-deep); }
    .orange-theme .pc-window-controls .pc-dot:nth-child(1) { background: var(--pixel-pink); }
    .orange-theme .pc-window-controls .pc-dot:nth-child(2) { background: var(--amber); }
    .orange-theme .pc-window-controls .pc-dot:nth-child(3) { background: var(--orange); }
    .pc-window-title { font-family: var(--font-mono); font-size: 12px; font-weight: bold; color: var(--text-muted); }

    .pc-image { flex: 1; padding: 24px; display: flex; align-items: center; justify-content: center; position: relative; }
    .orange-theme .pc-image { background-image: radial-gradient(var(--border-soft) 1px, transparent 1px); background-size: 16px 16px; }
    .carousel-inner {
      position: relative; border: 2px solid var(--orange); border-radius: 4px; overflow: hidden; background: var(--surface-strong);
      box-shadow: 4px 4px 0 rgba(21,21,21,0.05); transition: transform 0.22s, box-shadow 0.22s;
    }
    .project-card:hover .carousel-inner { transform: translateY(-4px); box-shadow: 8px 8px 0 var(--border); }
    .carousel-inner.desktop-ratio { width: 100%; aspect-ratio: 16 / 10; }
    .carousel-inner.app-ratio { width: 100%; max-width: 260px; aspect-ratio: 9 / 19; margin: 0 auto; }
    
    .carousel-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: 1; }
    .carousel-inner.desktop-ratio .carousel-slide { object-fit: cover; }
    .carousel-inner.app-ratio .carousel-slide { object-fit: contain; }
    .carousel-slide.active { opacity: 1; z-index: 2; }
    
    .scanline-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(245, 158, 11, 0.15); border-bottom: 3px solid var(--amber);
      z-index: 10; transform: translateY(-100%); pointer-events: none; opacity: 0;
    }
    .scanline-overlay.active { animation: scanline-sweep 0.22s linear forwards; opacity: 1; }
    @keyframes scanline-sweep { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%); width: 28px; height: 28px;
      background: var(--surface-strong); border: 2px solid var(--border); font-family: var(--font-mono); font-size: 14px;
      color: var(--brand); cursor: pointer; z-index: 11; opacity: 0; transition: opacity 0.2s, background 0.2s, color 0.2s;
      display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 0 var(--border-soft);
    }
    .project-card:hover .carousel-btn { opacity: 1; }
    .carousel-btn:hover { background: var(--orange); color: var(--surface-strong); border-color: var(--orange); }
    .carousel-btn.prev { left: 8px; }
    .carousel-btn.next { right: 8px; }

    .carousel-status-bar {
      display: flex; justify-content: space-between; align-items: center; padding: 12px 16px;
      background: var(--surface-strong); border-top: 2px solid var(--border);
      font-family: var(--font-mono); font-size: 11px; font-weight: bold;
    }
    .csb-left { color: var(--brand); }
    .csb-right { color: var(--orange); }
    .carousel-dots { display: flex; gap: 6px; }
    .carousel-dots .dot {
      width: 6px; height: 6px; border: 2px solid var(--border); background: var(--surface-strong);
      padding: 0; cursor: pointer; transition: all 0.2s;
    }
    .carousel-dots .dot.active { background: var(--orange); border-color: var(--orange); transform: scale(1.2); }
    .pc-image-tag {
      position: absolute; top: 8px; right: 8px; background: var(--surface-strong); border: 2px solid var(--border);
      padding: 2px 6px; font-family: var(--font-mono); font-size: 9px; font-weight: bold; color: var(--text-main);
      z-index: 3; border-radius: 2px; box-shadow: 2px 2px 0 var(--border-soft);
    }

    .pc-content { padding: 48px 40px; display: flex; flex-direction: column; justify-content: center; }
    .pc-title { font-size: 24px; margin-bottom: 12px; color: var(--text-main); }
    .pc-subtitle { font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
    .pc-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 32px; }
    .pc-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
    .pc-tag { font-family: var(--font-mono); font-size: 12px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; color: var(--brand); font-weight: 600; background: var(--bg); }
    .blue-theme .pc-tag { color: var(--blue-deep); }
    .orange-theme .pc-tag { color: var(--orange); }

    };

    // ==========================================
    // 2. Rendering Functions
    // ==========================================
    const renderProfile = () => {
      document.getElementById('navBrand').innerHTML = profileData.name;
      document.getElementById('navLinks').innerHTML = profileData.navLinks.map(link => 
        `<a href="${link.link}" class="nav-link">${link.text}</a>`
      ).join('');
      
      document.getElementById('heroSubtitle').innerHTML = profileData.role;
      document.getElementById('heroTitle').innerHTML = profileData.headline;
      document.getElementById('heroDesc').innerHTML = profileData.description;
      document.getElementById('heroActions').innerHTML = profileData.heroActions.map(action => 
        `<a href="${action.link}" class="btn ${action.primary ? 'btn-primary' : 'btn-secondary'}">${action.text}</a>`
      ).join('');
      
      document.getElementById('aboutText').innerHTML = profileData.aboutText;
      document.getElementById('aboutTags').innerHTML = profileData.aboutTags.map(tag => 
        `<span class="abt-tag">${tag}</span>`
      ).join('');

      document.getElementById('footerCopy').innerHTML = profileData.footerCopy;
    };

    const renderProjects = () => {
      const container = document.getElementById('projectsGrid');
      container.innerHTML = projectData.map(project => `
        <article class="project-card ${project.theme}">
          <div class="pc-image-col">
            <div class="pc-window-bar">
              <div class="pc-window-controls">
                <div class="pc-dot"></div><div class="pc-dot"></div><div class="pc-dot"></div>
              </div>
              <div class="pc-window-title">${project.windowTitle}</div>
            </div>
            <div class="pc-image carousel-container">
              <div class="carousel-inner ${project.ratio}" data-project-id="${project.id}">
                ${project.ratio === 'app-ratio' ? `<div class="pc-image-tag">Android / SQLite / 统计图表</div>` : ''}
                <div class="scanline-overlay"></div>
                ${project.screenshots.map((shot, idx) => `
                  <img src="${shot.src}" alt="${shot.alt}" class="carousel-slide ${idx === 0 ? 'active' : ''}">
                `).join('')}
                <button class="carousel-btn prev" aria-label="Previous">&lt;</button>
                <button class="carousel-btn next" aria-label="Next">&gt;</button>
              </div>
            </div>
            <div class="carousel-status-bar">
              <div class="csb-left" id="csb-left-${project.id}">SCREEN 01 / 0${project.screenshots.length}</div>
              <div class="carousel-dots" id="dots-${project.id}">
                ${project.screenshots.map((_, idx) => `
                  <button class="dot ${idx === 0 ? 'active' : ''}" aria-label="Slide ${idx + 1}" data-index="${idx}"></button>
                `).join('')}
              </div>
              <div class="csb-right">VIEW DETAILS &rarr;</div>
            </div>
          </div>
          <div class="pc-content">
            <h3 class="pc-title">${project.title}</h3>
            <div class="pc-subtitle">${project.subtitle}</div>
            <p class="pc-desc">${project.description}</p>
            <div class="pc-tags">
              ${project.tags.map(tag => `<span class="pc-tag">${tag}</span>`).join('')}
            </div>
            <a href="${project.detailLink}" class="pc-link">查看详情 <span class="pc-link-icon">&rarr;</span></a>
          </div>
        </article>
      `).join('');
    };

    const renderWorkflow = () => {
      const container = document.getElementById('workflowGrid');
      container.innerHTML = workflowData.map(item => `
        <div class="wf-task-panel ${item.statusType}" tabindex="0">
          <div class="wfp-node-dot"></div>
          <div class="wfp-header">
            <span class="wfp-num">${item.step}</span>
            <span class="wfp-badge">${item.status}</span>
          </div>
          <div class="wfp-title">${item.title}</div>
          ${item.progress !== undefined ? `
            <div class="wfp-progress">
              <div class="wfp-progress-bar" style="width: ${item.progress}%" id="wf-prog-${item.step}"></div>
            </div>
          ` : ''}
          <div class="wfp-footer">OPEN STEP LOG</div>
        </div>
      `).join('');
    };

    const renderSkills = () => {
      const container = document.getElementById('skillsGrid');
      container.innerHTML = skillsData.map(item => `
        <div class="skill-console ${item.highlight ? 'highlight' : ''}" tabindex="0">
          <div class="sc-top-bar">MODULE ${item.module}</div>
          <div class="sc-body">
            <div class="sc-icon-area">${icons[item.icon]}</div>
            <div class="sc-content-area">
              <h3 class="sc-title">${item.title}</h3>
              <p class="sc-desc">${item.description}</p>
              <div class="sc-chips">
                ${item.items.map(chip => `<span class="sc-chip-item">${chip}</span>`).join('')}
              </div>
              <div class="sc-signal-bar">
                ${[1,2,3,4,5].map(lvl => `<div class="signal-block ${lvl <= item.signalLevel ? 'active' : ''}"></div>`).join('')}
              </div>
            </div>
          </div>
        </div>
      `).join('');
    };

    const renderFooter = () => {
      document.getElementById('footerLinks').innerHTML = footerLinks.map(link => 
        `<a href="${link.url}">${link.text}</a>`
      ).join('');
    };

    // ==========================================
    // 3. Interaction Initializers
    // ==========================================
    const initProjectCarousels = () => {
      const inners = document.querySelectorAll('.carousel-inner');
      inners.forEach(inner => {
        const pid = inner.getAttribute('data-project-id');
        const slides = inner.querySelectorAll('.carousel-slide');
        const scanline = inner.querySelector('.scanline-overlay');
        const dotsContainer = document.getElementById(`dots-${pid}`);
        const dots = dotsContainer.querySelectorAll('.dot');
        const leftStatus = document.getElementById(`csb-left-${pid}`);
        const prevBtn = inner.querySelector('.carousel-btn.prev');
        const nextBtn = inner.querySelector('.carousel-btn.next');
        
        let currentIndex = 0;
        let isAnimating = false;
        
        const updateCarousel = (newIndex) => {
          if (isAnimating || newIndex === currentIndex) return;
          isAnimating = true;
          
          scanline.classList.remove('active');
          void scanline.offsetWidth;
          scanline.classList.add('active');
          
          setTimeout(() => {
            slides[currentIndex].classList.remove('active');
            dots[currentIndex].classList.remove('active');
            currentIndex = newIndex;
            slides[currentIndex].classList.add('active');
            dots[currentIndex].classList.add('active');
            leftStatus.textContent = `SCREEN 0${currentIndex + 1} / 0${slides.length}`;
          }, 110);

          setTimeout(() => { isAnimating = false; }, 220);
        };

        prevBtn.addEventListener('click', (e) => { e.preventDefault(); updateCarousel((currentIndex - 1 + slides.length) % slides.length); });
        nextBtn.addEventListener('click', (e) => { e.preventDefault(); updateCarousel((currentIndex + 1) % slides.length); });
        dots.forEach((dot) => {
          dot.addEventListener('click', (e) => { e.preventDefault(); updateCarousel(parseInt(dot.getAttribute('data-index'))); });
        });
      });
    };

    const initPixelAICore = () => {
      const core = document.getElementById('pixelAiCore');
      const cube = document.getElementById('pixelCube');
      const scene = document.getElementById('aiCoreScene');
      const label = document.getElementById('aiCoreLabel');
      const lights = document.querySelectorAll('.c-light');
      if (!core || !cube) return;

      let isDragging = false, hasDragged = false;
      let startX, startY;
      let currentX = -20, currentY = 30;
      let autoRotateRaf, autoRotateAngleY = 0;
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const updateTransform = () => { core.style.transform = `rotateX(${currentX}deg) rotateY(${currentY + autoRotateAngleY}deg)`; };
      updateTransform();

      let lastTime = performance.now();
      const autoRotate = (time) => {
        if (!prefersReducedMotion && !isDragging) {
          const delta = time - lastTime;
          autoRotateAngleY += (scene.matches(':hover') ? 0.06 : 0.02) * delta;
          updateTransform();
        }
        lastTime = time;
        autoRotateRaf = requestAnimationFrame(autoRotate);
      };
      autoRotateRaf = requestAnimationFrame(autoRotate);

      scene.addEventListener('mouseenter', () => { 
        if (!isDragging) label.textContent = 'CLICK TO BOOT'; 
        lights.forEach((light, i) => {
          setTimeout(() => { light.style.opacity = '0.4'; setTimeout(() => light.style.opacity = '1', 200); }, i * 150);
        });
      });
      scene.addEventListener('mouseleave', () => { if (!isDragging) label.textContent = 'DRAG TO ROTATE'; });

      core.addEventListener('mousedown', (e) => {
        isDragging = true; hasDragged = false; startX = e.clientX; startY = e.clientY;
        core.style.transition = 'none'; label.textContent = 'DRAG TO ROTATE';
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        hasDragged = true;
        currentY += (e.clientX - startX) * 0.6;
        currentX = Math.max(-80, Math.min(80, currentX - (e.clientY - startY) * 0.6));
        updateTransform();
        startX = e.clientX; startY = e.clientY;
      });

      document.addEventListener('mouseup', () => {
        if (isDragging) {
          isDragging = false; core.style.transition = 'transform 0.1s ease-out';
          setTimeout(() => { core.style.transition = 'none'; }, 100);
          label.textContent = scene.matches(':hover') ? 'CLICK TO BOOT' : 'DRAG TO ROTATE';
        }
      });

      let isExploded = false;
      cube.addEventListener('click', () => {
        if (hasDragged || isExploded) return;
        isExploded = true;
        label.textContent = 'BOOTING...';
        cube.classList.add('exploded');
        document.querySelectorAll('.orbit-token').forEach(t => t.classList.add('flash'));
        setTimeout(() => {
          cube.classList.remove('exploded');
          document.querySelectorAll('.orbit-token').forEach(t => t.classList.remove('flash'));
          label.textContent = scene.matches(':hover') ? 'CLICK TO BOOT' : 'DRAG TO ROTATE';
          isExploded = false;
        }, 450);
      });
    };

    const initInteractions = () => {
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting && !prefersReducedMotion) {
            entry.target.style.transform = 'translateX(0)';
            entry.target.style.opacity = '1';
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.sh-num').forEach(num => {
        if (!prefersReducedMotion) {
          num.style.transform = 'translateX(-20px)'; num.style.opacity = '0';
        }
        observer.observe(num);
      });

      const activeCard = document.querySelector('.wf-task-panel.active');
      const progBar = document.getElementById('wf-prog-04');
      if (activeCard && progBar && !prefersReducedMotion) {
        const replayProg = () => {
          progBar.style.transition = 'none'; progBar.style.width = '0%';
          void progBar.offsetWidth;
          progBar.style.transition = 'width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
          progBar.style.width = '62%';
        };
        activeCard.addEventListener('click', replayProg);
        activeCard.addEventListener('focus', replayProg);
      }
    };

    // ==========================================
    // 4. Boot Application
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
      renderProfile();
      renderProjects();
      renderWorkflow();
      renderSkills();
      renderFooter();
      
      initProjectCarousels();
      initPixelAICore();
      initInteractions();
    });

    /**
     * Maintenance Guide:
     * 1. Update personal info in `profileData`.
     * 2. Add a new project in `projectData` array.
     * 3. Add screenshots inside `project.screenshots`.
     * 4. Add skills in `skillsData`.
     * 5. Update workflow status in `workflowData` (use statusType 'done', 'active', 'pending').
     * 6. Keep visual styles in CSS variables in :root.
     */
  </script>
</body>
</html>
